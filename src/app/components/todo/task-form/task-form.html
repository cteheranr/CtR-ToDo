<div class="drawer-overlay" [class.open]="isOpen" (click)="close()"></div>

<div class="drawer-content" [class.open]="isOpen">
  <header>
    <h2>{{ taskToEdit ? 'Editar Tarea' : 'Nueva Tarea' }}</h2>
    <button class="btn-close" (click)="close()">×</button>
  </header>

  <form [formGroup]="taskForm" (ngSubmit)="submit()">
    <div class="form-group">
      <label>Título</label>
      <input type="text" formControlName="title" placeholder="Ej: Comprar café" />
    </div>

    <div class="form-group">
      <label>Prioridad</label>
      <select formControlName="priority">
        <option value="baja">Baja</option>
        <option value="media">Media</option>
        <option value="alta">Alta</option>
      </select>
    </div>

    <div class="form-group">
      <label>Estado</label>
      <select formControlName="status">
        <option value="Pendiente">Pendiente</option>
        <option value="En proceso">En proceso</option>
        <option value="Completado">Completado</option>
      </select>
    </div>

    <div class="form-group">
      <label>Descripción</label>
      <textarea
        formControlName="description"
        rows="4"
        placeholder="Detalles adicionales..."
      ></textarea>
    </div>

    <footer>
      <button type="button" class="btn-cancel" (click)="close()">Cancelar</button>
      <button type="submit" class="btn-save" [disabled]="taskForm.invalid">
        {{ taskToEdit ? 'Actualizar' : 'Guardar' }}
      </button>
    </footer>
  </form>
</div>
